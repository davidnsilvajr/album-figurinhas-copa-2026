<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Álbum Copa do Mundo 2026 — Minhas Figurinhas</title>
<style>
  :root{
    --bg:#0c1230;
    --bg2:#131a44;
    --panel:#1b2356;
    --panel2:#222c6b;
    --line:rgba(255,255,255,.10);
    --txt:#eef1ff;
    --muted:#9aa3d4;
    --green:#1fc16b;
    --green2:#16a35a;
    --gold:#ffcf3f;
    --red:#e23a45;
    --blue:#3b7dff;
    --radius:18px;
    --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    color:var(--txt);
    background:
      radial-gradient(1100px 600px at 12% -8%, #2a347e 0%, transparent 55%),
      radial-gradient(900px 500px at 100% 0%, #4a1f6b 0%, transparent 50%),
      linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
    background-attachment:fixed;
    min-height:100vh;
    padding-bottom:120px;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:0 14px}

  /* ---------- HEADER ---------- */
  header{position:relative;overflow:hidden;border-bottom:1px solid var(--line)}
  .hero{
    background:
      linear-gradient(120deg,#0a8f4a 0%, #0a8f4a 30%, #ffffff 30%, #ffffff 38%, #e2231a 38%, #e2231a 70%, #1f3a93 70%);
    height:6px;width:100%;
  }
  .head-inner{display:flex;align-items:center;gap:16px;padding:18px 0 16px;flex-wrap:wrap}
  .logo{
    width:58px;height:58px;flex:0 0 auto;border-radius:16px;display:grid;place-items:center;
    background:linear-gradient(145deg,#ffcf3f,#ff9b1e);box-shadow:0 8px 20px rgba(255,160,30,.35);
    font-size:30px;
  }
  .titles h1{margin:0;font-size:22px;font-weight:800;letter-spacing:.3px;line-height:1.05}
  .titles p{margin:2px 0 0;color:var(--muted);font-size:13px;font-weight:600}
  .head-spacer{flex:1}

  /* ---------- STATS ---------- */
  .stats{display:flex;gap:10px;flex-wrap:wrap}
  .stat{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:10px 14px;min-width:96px;text-align:center;box-shadow:var(--shadow)
  }
  .stat b{display:block;font-size:20px;font-weight:800;line-height:1}
  .stat span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:700}
  .stat.ok b{color:var(--green)}
  .stat.miss b{color:#ff8a8a}
  .stat.dup b{color:var(--gold)}

  .progressbar{height:10px;border-radius:99px;background:rgba(255,255,255,.10);overflow:hidden;margin:14px 0 4px}
  .progressbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--green2),var(--green));width:0;transition:width .4s}
  .progresslabel{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px}

  /* ---------- TOOLBAR ---------- */
  .toolbar{position:sticky;top:0;z-index:30;background:rgba(12,18,48,.82);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:10px 0;margin-top:10px}
  .toolrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:9px 12px}
  .search input{flex:1;background:transparent;border:0;outline:0;color:var(--txt);font-size:15px;font-weight:600}
  .search input::placeholder{color:var(--muted)}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:var(--panel);color:var(--muted);font-weight:700;
    padding:8px 14px;border-radius:99px;font-size:13px;cursor:pointer;transition:.15s;user-select:none}
  .chip.active{background:#fff;color:#12183f;border-color:#fff}
  .cloudpill{margin-left:auto}
  .cloudpill.on{background:rgba(31,193,107,.18);border-color:rgba(31,193,107,.5);color:#7ef0ad}
  .cloudpill.saving{background:rgba(255,207,63,.18);border-color:rgba(255,207,63,.5);color:var(--gold)}
  .cloudpill.err{background:rgba(226,58,69,.18);border-color:rgba(226,58,69,.5);color:#ff9b9b}
  .chip:hover{color:var(--txt)}
  .chip.active:hover{color:#12183f}

  /* ---------- TEAM CARD ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px;margin-top:18px}
  .team{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
    border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
  .team.special{background:linear-gradient(180deg,#2a2350,#3a2a16);border-color:rgba(255,207,63,.35)}
  .team.cc{background:linear-gradient(180deg,#3a1620,#511a22);border-color:rgba(226,58,69,.4)}
  .team-head{display:flex;align-items:center;gap:11px;margin-bottom:12px}
  .flag{width:46px;height:32px;border-radius:6px;object-fit:cover;background:#0008;
    box-shadow:0 3px 8px rgba(0,0,0,.4);flex:0 0 auto}
  .badge-flag{width:46px;height:32px;border-radius:6px;display:grid;place-items:center;font-size:18px;flex:0 0 auto}
  .badge-flag.gold{background:linear-gradient(145deg,#ffcf3f,#ff9b1e);color:#5a3a00}
  .badge-flag.cc{background:linear-gradient(145deg,#e2231a,#a3121b);color:#fff;font-weight:900;font-size:13px}
  .team-name{flex:1;min-width:0}
  .team-name b{display:block;font-size:16px;font-weight:800;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .team-name span{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px}
  .grp{font-size:11px;font-weight:800;color:#12183f;background:#fff;border-radius:7px;padding:3px 8px}
  .team-mini{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:8px}
  .mini-bar{height:5px;border-radius:99px;background:rgba(255,255,255,.10);overflow:hidden;margin-bottom:10px}
  .mini-bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--green2),var(--green));width:0;transition:width .35s}

  /* ---------- STICKER ---------- */
  .stickers{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
  .st{
    position:relative;aspect-ratio:1/1.18;border-radius:11px;cursor:pointer;
    display:grid;place-items:center;font-weight:800;font-size:15px;user-select:none;
    border:1.5px dashed rgba(255,255,255,.22);
    background:rgba(255,255,255,.04);color:var(--muted);
    transition:transform .08s, background .15s, border-color .15s;
  }
  .st:active{transform:scale(.92)}
  .st .num{position:relative;z-index:2}
  .st.have{
    border:1.5px solid transparent;color:#063;
    background:linear-gradient(160deg,#7ef0ad,#1fc16b 55%,#0f9b53);
    box-shadow:0 4px 10px rgba(31,193,107,.30), inset 0 1px 0 rgba(255,255,255,.5);
    color:#063a1f;
  }
  .st.have::after{ /* gloss */
    content:"";position:absolute;inset:0;border-radius:11px;z-index:1;
    background:linear-gradient(135deg,rgba(255,255,255,.55) 0%,rgba(255,255,255,0) 42%);
  }
  .st.have .check{position:absolute;top:4px;right:5px;z-index:3;font-size:10px;color:#063a1f;opacity:.8}
  .st.dup{
    background:linear-gradient(160deg,#ffe27a,#ffcf3f 55%,#f3a712);
    color:#5a3a00;box-shadow:0 4px 10px rgba(255,180,40,.32), inset 0 1px 0 rgba(255,255,255,.6);
  }
  .st.dup::after{content:"";position:absolute;inset:0;border-radius:11px;z-index:1;
    background:linear-gradient(135deg,rgba(255,255,255,.6) 0%,rgba(255,255,255,0) 45%)}
  .st .dupbadge{
    position:absolute;top:-6px;right:-6px;z-index:4;background:var(--red);color:#fff;
    font-size:11px;font-weight:900;min-width:20px;height:20px;border-radius:99px;display:grid;place-items:center;
    padding:0 5px;box-shadow:0 2px 6px rgba(0,0,0,.4);border:2px solid #131a44}
  .st.hl{outline:3px solid var(--blue);outline-offset:2px}

  /* ---------- SHARE / TOAST / MODAL ---------- */
  .fab{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(12,18,48,.9);
    backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:12px 14px;
    display:flex;gap:10px;justify-content:center}
  .btn{border:0;border-radius:13px;padding:13px 18px;font-size:15px;font-weight:800;cursor:pointer;
    display:inline-flex;align-items:center;gap:8px;transition:.15s;box-shadow:var(--shadow)}
  .btn.miss{background:linear-gradient(160deg,#ff6b6b,#e23a45);color:#fff}
  .btn.dup{background:linear-gradient(160deg,#ffd95e,#f3a712);color:#4a2e00}
  .btn.ghost{background:var(--panel);color:var(--txt);border:1px solid var(--line)}
  .btn:active{transform:translateY(1px)}

  .modal-bg{position:fixed;inset:0;z-index:60;background:rgba(4,6,20,.75);display:none;
    align-items:center;justify-content:center;padding:16px}
  .modal-bg.show{display:flex}
  .modal{background:linear-gradient(180deg,var(--panel),#171f4d);border:1px solid var(--line);
    border-radius:20px;max-width:560px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
  .modal h3{margin:0;padding:18px 20px;border-bottom:1px solid var(--line);font-size:17px;display:flex;align-items:center;gap:9px}
  .modal .body{padding:16px 20px;overflow:auto}
  .modal textarea{width:100%;min-height:200px;background:#0e1437;border:1px solid var(--line);border-radius:12px;
    color:var(--txt);padding:12px;font-size:13px;font-family:"Consolas",monospace;resize:vertical;line-height:1.5}
  .modal .foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
  .modal .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:22px;line-height:1;background:none;border:0}

  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);z-index:80;
    background:#fff;color:#12183f;padding:12px 20px;border-radius:99px;font-weight:800;font-size:14px;
    box-shadow:0 12px 30px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:.25s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:14px 0 2px;font-size:12px;color:var(--muted);font-weight:700}
  .legend i{display:inline-block;width:14px;height:14px;border-radius:4px;vertical-align:-2px;margin-right:5px}
  .lg-falta{border:1.5px dashed rgba(255,255,255,.4);background:rgba(255,255,255,.04)}
  .lg-have{background:linear-gradient(160deg,#7ef0ad,#1fc16b)}
  .lg-dup{background:linear-gradient(160deg,#ffe27a,#f3a712)}
  .hint{font-size:12px;color:var(--muted);margin-top:4px}
  .empty{text-align:center;color:var(--muted);padding:60px 20px;font-weight:700}
  @media(max-width:520px){
    .grid{grid-template-columns:1fr}
    .titles h1{font-size:18px}
    .btn{padding:12px 14px;font-size:14px}
    .stat{min-width:80px;padding:8px 10px}
    .stat b{font-size:17px}
  }
</style>
</head>
<body>
<header>
  <div class="hero"></div>
  <div class="wrap head-inner">
    <div class="logo">🏆</div>
    <div class="titles">
      <h1>Minhas Figurinhas</h1>
      <p>Álbum Copa do Mundo 2026 · controle de coladas e repetidas</p>
    </div>
    <div class="head-spacer"></div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="wrap">
    <div class="progresslabel" id="progresslabel">0% completo</div>
    <div class="progressbar"><i id="progressfill"></i></div>
    <div class="legend">
      <span><i class="lg-falta"></i>Falta</span>
      <span><i class="lg-have"></i>Tenho</span>
      <span><i class="lg-dup"></i>Repetida</span>
      <span class="hint">Toque: Falta → Tenho → +1 repetida… · Toque longo / clique direito: volta</span>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="wrap toolrow">
    <div class="search">
      🔎 <input id="search" type="text" placeholder="Buscar seleção (ex: Brasil, BRA, Argentina)…" autocomplete="off">
    </div>
    <div class="filters">
      <span class="chip active" data-filter="all">Todas</span>
      <span class="chip" data-filter="miss">Faltam</span>
      <span class="chip" data-filter="dup">Repetidas</span>
      <span class="chip" data-filter="done">Completas</span>
    </div>
    <span class="chip cloudpill" id="cloudPill" title="Sincronização na nuvem">☁️ <span id="cloudPillTxt">Nuvem</span></span>
  </div>
</div>

<div class="wrap">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">Nenhuma seleção encontrada com esse filtro 😕</div>
</div>

<div class="fab">
  <button class="btn miss" id="shareMiss">📋 Faltas pro Whats</button>
  <button class="btn dup" id="shareDup">📋 Repetidas pro Whats</button>
  <button class="btn ghost" id="menuBtn">⚙️</button>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3><span id="modalIcon">📋</span><span id="modalTitle">Compartilhar</span>
      <button class="x" id="modalX">&times;</button></h3>
    <div class="body">
      <textarea id="modalText" readonly></textarea>
    </div>
    <div class="foot" id="modalFoot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase (sincronização na nuvem) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const TEAMS = [
  // Grupo, Nome, Código FIFA, ISO p/ bandeira
  ["A","México","MEX","mx"],["A","África do Sul","RSA","za"],["A","Coreia do Sul","KOR","kr"],["A","Rep. Tcheca","CZE","cz"],

  ["L","Inglaterra","ENG","gb-eng"],["L","Croácia","CRO","hr"],["L","Gana","GHA","gh"],["L","Panamá","PAN","pa"],
];

/* Sets especiais: [nome, código, tipo, início, fim] */

  ["FIFA World Cup","FWC","gold",0,19], // capa + história (0 a 19)
  ["Coca-Cola","CC","cc",1,14],
];

/* Monta lista unificada de "cards" */

TEAMS.forEach(([grp,name,code,iso])=>{
  const nums=[]; for(let i=1;i<=20;i++) nums.push(i);
  CARDS.push({type:"team",grp,name,code,iso,nums});
});
SPECIALS.forEach(([name,code,kind,a,b])=>{
  const nums=[]; for(let i=a;i<=b;i++) nums.push(i);
  CARDS.push({type:"special",kind,name,code,nums});
});

const TOTAL = CARDS.reduce((s,c)=>s+c.nums.length,0);

let state = {}; // { "BRA-5": 2 }  -> 0/ausente=falta, 1=tenho, 2=tenho+1 rep, 3=tenho+2 rep...
const _saved = localStorage.getItem(KEY);
if(_saved===null){
  state = Object.assign({}, SEED);   // primeira vez: carrega o que o David já tem
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
}else{
  try{ state = JSON.parse(_saved) || {}; }catch(e){ state={}; }
}

function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} cloudPush(); }
function get(id){ return state[id]||0; }
function setVal(id,v){ if(v<=0) delete state[id]; else state[id]=v; save(); }

/* ============ RENDER ============ */
const grid = document.getElementById("grid");
let activeFilter="all", searchTerm="";

function flagEl(card){
  if(card.type==="special"){
    if(card.kind==="cc") return `<div class="badge-flag cc">CC</div>`;
    return `<div class="badge-flag gold">🏆</div>`;
  }
  return `<img class="flag" loading="lazy" alt="${card.name}"
     src="https://flagcdn.com/w80/${card.iso}.png"
     srcset="https://flagcdn.com/w160/${card.iso}.png 2x"
     onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'badge-flag gold',textContent:'${card.code}'}))">`;
}

function cardStats(card){
  let have=0, dup=0;
  card.nums.forEach(n=>{ const v=get(card.code+"-"+n); if(v>=1)have++; if(v>=2)dup+=v-1; });
  return {have,dup,total:card.nums.length};
}

function matchFilter(card){
  if(searchTerm){
    const t=searchTerm.toLowerCase();
    if(!(card.name.toLowerCase().includes(t) || card.code.toLowerCase().includes(t))) return false;
  }
  if(activeFilter==="all") return true;
  const s=cardStats(card);
  if(activeFilter==="miss") return s.have<s.total;
  if(activeFilter==="dup")  return s.dup>0;
  if(activeFilter==="done") return s.have===s.total;
  return true;
}

function render(){
  grid.innerHTML="";
  let shown=0;
  CARDS.forEach(card=>{
    if(!matchFilter(card)) return;
    shown++;
    const s=cardStats(card);
    const pct = Math.round(s.have/s.total*100);
    const el=document.createElement("div");
    el.className="team"+(card.type==="special"?(card.kind==="cc"?" special cc":" special"):"");
    const grpTag = card.type==="team" ? `<span class="grp">${card.grp}</span>` : "";
    el.innerHTML=`
      <div class="team-head">
        ${flagEl(card)}
        <div class="team-name"><b>${card.name}</b><span>${card.code}</span></div>
        ${grpTag}
      </div>
      <div class="team-mini">${s.have}/${s.total} coladas${s.dup?` · ${s.dup} repetida${s.dup>1?'s':''}`:''}</div>
      <div class="mini-bar"><i style="width:${pct}%"></i></div>
      <div class="stickers"></div>`;
    const cont=el.querySelector(".stickers");
    card.nums.forEach(n=>{
      const id=card.code+"-"+n;
      cont.appendChild(stickerEl(id,n));
    });
    grid.appendChild(el);
  });
  document.getElementById("empty").style.display = shown? "none":"block";
  renderStats();
}

function stickerEl(id,n){
  const v=get(id);
  const d=document.createElement("div");
  d.className="st"+(v===1?" have":v>=2?" dup":"");
  d.dataset.id=id;
  let inner=`<span class="num">${n}</span>`;
  if(v===1) inner+=`<span class="check">✓</span>`;
  if(v>=2)  inner+=`<span class="dupbadge">+${v-1}</span>`;
  d.innerHTML=inner;
  return d;
}

function cycle(id,back){
  let v=get(id);
  v = back ? v-1 : v+1;
  if(v<0) v=0;
  setVal(id,v);
}

/* clique normal avança; clique-direito / toque-longo volta */
grid.addEventListener("click",e=>{
  const st=e.target.closest(".st"); if(!st) return;
  cycle(st.dataset.id,false);
  refreshSticker(st);
});
grid.addEventListener("contextmenu",e=>{
  const st=e.target.closest(".st"); if(!st) return;
  e.preventDefault();
  cycle(st.dataset.id,true);
  refreshSticker(st);
});
/* toque longo (mobile) volta */
let pressTimer=null, longPressed=false;
grid.addEventListener("touchstart",e=>{
  const st=e.target.closest(".st"); if(!st) return;
  longPressed=false;
  pressTimer=setTimeout(()=>{ longPressed=true; cycle(st.dataset.id,true); refreshSticker(st);
    if(navigator.vibrate)navigator.vibrate(15); },420);
},{passive:true});
grid.addEventListener("touchend",e=>{
  if(pressTimer)clearTimeout(pressTimer);
  if(longPressed){ longPressed=false; e.preventDefault(); }
},{passive:false});

function refreshSticker(st){
  const id=st.dataset.id, n=id.split("-")[1];
  const fresh=stickerEl(id,n);
  st.replaceWith(fresh);
  // atualiza mini stats do card
  const team=fresh.closest(".team");
  const code=id.split("-")[0];
  const card=CARDS.find(c=>c.code===code);
  const s=cardStats(card);
  const pct=Math.round(s.have/s.total*100);
  team.querySelector(".team-mini").textContent=
    `${s.have}/${s.total} coladas${s.dup?` · ${s.dup} repetida${s.dup>1?'s':''}`:''}`;
  team.querySelector(".mini-bar > i").style.width=pct+"%";
  renderStats();
}

function totals(){
  let have=0,dup=0;
  CARDS.forEach(c=>c.nums.forEach(n=>{
    const v=get(c.code+"-"+n);
    if(v>=1)have++; if(v>=2)dup+=v-1;
  }));
  return {have,miss:TOTAL-have,dup};
}

function renderStats(){
  const t=totals();
  document.getElementById("stats").innerHTML=`
    <div class="stat ok"><b>${t.have}</b><span>Tenho</span></div>
    <div class="stat miss"><b>${t.miss}</b><span>Faltam</span></div>
    <div class="stat dup"><b>${t.dup}</b><span>Repetidas</span></div>
    <div class="stat"><b>${TOTAL}</b><span>Total</span></div>`;
  const pct=Math.round(t.have/TOTAL*100);
  document.getElementById("progressfill").style.width=pct+"%";
  document.getElementById("progresslabel").textContent=`${pct}% completo · ${t.have} de ${TOTAL} figurinhas`;
}

/* ============ FILTROS / BUSCA ============ */
document.querySelectorAll(".chip").forEach(ch=>{
  ch.addEventListener("click",()=>{
    document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
    ch.classList.add("active");
    activeFilter=ch.dataset.filter;
    render();
  });
});
let searchT;
document.getElementById("search").addEventListener("input",e=>{
  clearTimeout(searchT);
  searchT=setTimeout(()=>{ searchTerm=e.target.value.trim(); render(); },150);
});

/* ============ COMPARTILHAR (WhatsApp) ============ */
function buildMissText(){
  let lines=["⚽ *FALTAM no meu álbum — Copa 2026*",""];
  let any=false;
  CARDS.forEach(c=>{
    const faltam=c.nums.filter(n=>get(c.code+"-"+n)===0);
    if(faltam.length){ any=true; lines.push(`*${c.code}* (${c.name}): ${faltam.join(", ")}`); }
  });
  if(!any) lines.push("🎉 Não falta nenhuma! Álbum completo!");
  const t=totals();
  lines.push("", `_Faltam ${t.miss} de ${TOTAL} figurinhas._`);
  return lines.join("\n");
}
function buildDupText(){
  let lines=["♻️ *Minhas REPETIDAS — Copa 2026 (pra troca)*",""];
  let any=false;
  CARDS.forEach(c=>{
    const reps=[];
    c.nums.forEach(n=>{ const v=get(c.code+"-"+n); if(v>=2) reps.push(n+(v>2?`(x${v-1})`:"")); });
    if(reps.length){ any=true; lines.push(`*${c.code}* (${c.name}): ${reps.join(", ")}`); }
  });
  if(!any) lines.push("Nenhuma repetida ainda 🤷");
  const t=totals();
  lines.push("", `_Tenho ${t.dup} figurinhas repetidas pra trocar!_`);
  return lines.join("\n");
}

const modalBg=document.getElementById("modalBg");
function prepModal(readonly){
  const s=document.getElementById("cloudStatus"); if(s) s.remove();
  document.getElementById("modalText").readOnly=!!readonly;
}
function openShare(title,icon,text){
  prepModal(true);
  document.getElementById("modalTitle").textContent=title;
  document.getElementById("modalIcon").textContent=icon;
  document.getElementById("modalText").value=text;
  const foot=document.getElementById("modalFoot");
  foot.innerHTML=`
    <button class="btn ghost" id="copyBtn">📋 Copiar</button>
    <button class="btn dup" id="waBtn">💬 Abrir WhatsApp</button>`;
  foot.querySelector("#copyBtn").onclick=()=>{
    navigator.clipboard.writeText(text).then(()=>toast("Copiado! Cole no WhatsApp 👍"))
      .catch(()=>{document.getElementById("modalText").select();document.execCommand("copy");toast("Copiado!");});
  };
  foot.querySelector("#waBtn").onclick=()=>{
    window.open("https://wa.me/?text="+encodeURIComponent(text),"_blank");
  };
  modalBg.classList.add("show");
}
document.getElementById("shareMiss").onclick=()=>openShare("Faltas pro WhatsApp","📋",buildMissText());
document.getElementById("shareDup").onclick=()=>openShare("Repetidas pro WhatsApp","♻️",buildDupText());
document.getElementById("modalX").onclick=()=>modalBg.classList.remove("show");
modalBg.addEventListener("click",e=>{ if(e.target===modalBg) modalBg.classList.remove("show"); });

/* ============ MENU (backup / limpar) ============ */
document.getElementById("menuBtn").onclick=()=>{
  prepModal(false);
  const text=JSON.stringify(state);
  document.getElementById("modalTitle").textContent="Backup & Opções";
  document.getElementById("modalIcon").textContent="⚙️";
  document.getElementById("modalText").value=text;
  const foot=document.getElementById("modalFoot");
  foot.innerHTML=`
    <button class="btn ghost" id="copyState">📋 Copiar backup</button>
    <button class="btn ghost" id="importState">📥 Importar</button>
    <button class="btn miss" id="clearState">🗑️ Zerar tudo</button>`;
  const ta=document.getElementById("modalText"); ta.readOnly=false;
  foot.querySelector("#copyState").onclick=()=>{navigator.clipboard.writeText(ta.value);toast("Backup copiado!");};
  foot.querySelector("#importState").onclick=()=>{
    try{ const obj=JSON.parse(ta.value); state=obj; save(); render(); modalBg.classList.remove("show"); toast("Importado! ✅"); }
    catch(e){ toast("Código inválido ❌"); }
  };
  foot.querySelector("#clearState").onclick=()=>{
    if(confirm("Apagar TODAS as marcações? Isso não pode ser desfeito.")){
      state={}; save(); render(); modalBg.classList.remove("show"); toast("Tudo zerado.");
    }
  };
  modalBg.classList.add("show");
};

/* ============ TOAST ============ */
let toastT;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),1900);
}

/* ============ SINCRONIZAÇÃO NA NUVEM (Firebase) ============ */
const CLOUD_KEY="figurinhas_cloud_cfg_v1";
let cloud = { cfg:null, code:null };
let db=null, docRef=null, unsub=null, pushTimer=null, applyingRemote=false;

try{ cloud = JSON.parse(localStorage.getItem(CLOUD_KEY)) || {cfg:null,code:null}; }catch(e){}

function cloudPillSet(cls,txt){
  const p=document.getElementById("cloudPill");
  p.className="chip cloudpill"+(cls?" "+cls:"");
  document.getElementById("cloudPillTxt").textContent=txt;
}

function cloudConnect(){
  if(!cloud.cfg || !cloud.code){ cloudPillSet("","Nuvem"); return; }
  if(typeof firebase==="undefined"){ cloudPillSet("err","Sem internet"); return; }
  try{
    if(!firebase.apps.length) firebase.initializeApp(cloud.cfg);
    db=firebase.firestore();
    docRef=db.collection("albuns").doc(cloud.code);
    cloudPillSet("saving","Conectando…");
    if(unsub) unsub();
    unsub=docRef.onSnapshot(snap=>{
      if(snap.exists && snap.data().state){
        const remote=snap.data().state;
        if(JSON.stringify(remote)!==JSON.stringify(state)){
          applyingRemote=true;
          state=remote;
          try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
          render();
          applyingRemote=false;
        }
        cloudPillSet("on","Sincronizado");
      }else{
        // documento novo: envia o que temos agora
        docRef.set({state:state, updatedAt:Date.now()}).then(()=>cloudPillSet("on","Sincronizado"));
      }
    }, err=>{ cloudPillSet("err","Erro nuvem"); console.error(err); });
  }catch(e){ cloudPillSet("err","Erro config"); console.error(e); }
}

function cloudPush(){
  if(!docRef || applyingRemote) return;
  cloudPillSet("saving","Salvando…");
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{
    docRef.set({state:state, updatedAt:Date.now()})
      .then(()=>cloudPillSet("on","Sincronizado"))
      .catch(e=>{ cloudPillSet("err","Erro ao salvar"); console.error(e); });
  },800);
}

/* Tela de configuração da nuvem */
document.getElementById("cloudPill").onclick=openCloudSetup;
function openCloudSetup(){
  prepModal(false);
  document.getElementById("modalTitle").textContent="Sincronizar na nuvem";
  document.getElementById("modalIcon").textContent="☁️";
  const ta=document.getElementById("modalText"); ta.readOnly=false;
  const status = cloud.cfg ? "✅ Configurado" : "⚠️ Ainda não configurado";
  ta.value = cloud.cfg ? JSON.stringify(cloud.cfg,null,2) : `Cole aqui a configuração do Firebase, algo assim:

{
  "apiKey": "AIza...",
  "authDomain": "seu-projeto.firebaseapp.com",
  "projectId": "seu-projeto",
  "storageBucket": "seu-projeto.appspot.com",
  "messagingSenderId": "123456789",
  "appId": "1:123:web:abc123"
}`;
  const foot=document.getElementById("modalFoot");
  foot.innerHTML=`
    <input id="syncCode" placeholder="código de sincronização (ex: david-copa-2026)"
      style="flex:1;min-width:200px;background:#0e1437;border:1px solid var(--line);border-radius:10px;color:#fff;padding:11px 12px;font-size:14px;font-weight:700">
    <button class="btn dup" id="cloudSave">☁️ Ativar sincronização</button>`;
  document.getElementById("syncCode").value = cloud.code || "";
  const oldS=document.getElementById("cloudStatus"); if(oldS) oldS.remove();
  document.querySelector(".modal h3").insertAdjacentHTML("afterend",
    `<div id="cloudStatus" style="padding:8px 20px;color:var(--muted);font-size:13px;font-weight:700;border-bottom:1px solid var(--line)">${status} — use o MESMO código em todos os aparelhos pra eles ficarem juntos.</div>`);
  foot.querySelector("#cloudSave").onclick=()=>{
    const code=document.getElementById("syncCode").value.trim().toLowerCase().replace(/[^a-z0-9\-]/g,"-");
    let cfg;
    try{ cfg=JSON.parse(ta.value); }catch(e){ toast("Configuração inválida ❌"); return; }
    if(!cfg.projectId || !cfg.apiKey){ toast("Faltam apiKey/projectId ❌"); return; }
    if(!code){ toast("Escolha um código de sincronização"); return; }
    cloud={cfg, code};
    localStorage.setItem(CLOUD_KEY, JSON.stringify(cloud));
    modalBg.classList.remove("show");
    toast("Nuvem ativada! ☁️");
    cloudConnect();
  };
  modalBg.classList.add("show");
}

/* ============ INIT ============ */
render();
cloudConnect();
